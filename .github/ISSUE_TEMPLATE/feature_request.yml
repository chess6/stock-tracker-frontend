name: Feature request
description: Suggest a UI or UX enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What workflow is painful or missing?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: mockup
    attributes:
      label: Mockup, screenshot, or reference
      description: Optional — describe layout or attach an image in a follow-up comment.
  - type: checkboxes
    id: principles
    attributes:
      label: UI fit
      options:
        - label: High information density (research terminal, not consumer trading app)
          required: false
        - label: Works with existing backend API (no new paid data source)
          required: false
